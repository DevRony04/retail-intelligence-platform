version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: store_intel_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: store_intelligence
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d store_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: store_intel_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/store_intelligence
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: store_intel_dashboard
    restart: always
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    command: streamlit run dashboard/dashboard.py --server.port 8501 --server.address 0.0.0.0

volumes:
  pgdata:
